# ============================================
# Casedance Docker Compose
# 本地开发：docker-compose up -d
# 生产部署：docker-compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
# ============================================

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: casedance.settings
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: ${DEBUG:-True}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
  BASE_URL: ${BASE_URL:-http://127.0.0.1:8000}
  DB_HOST: db
  DB_PORT: 3306
  DB_NAME: ${DB_NAME:-casedance}
  DB_USER: ${DB_USER:-root}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
  SUPERBED_TOKEN: ${SUPERBED_TOKEN}
  CDN_RATE_LIMIT_PER_HOUR: ${CDN_RATE_LIMIT_PER_HOUR:-1000}
  EBAY_CLIENT_ID: ${EBAY_CLIENT_ID}
  EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET}
  SD_COOKIES: ${SD_COOKIES}
  DIFY_INVOICE_APIKEY: ${DIFY_INVOICE_APIKEY}
  DIFY_EBAY_APIKEY: ${DIFY_EBAY_APIKEY}
  DIFY_HOST: ${DIFY_HOST}
  FEISHU_APP_ID: ${FEISHU_APP_ID:-}
  FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}

services:
  # 1. MySQL
  db:
    image: biarms/mysql:5.7
    pull_policy: missing
    container_name: casedance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-casedance}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./.docker/mysql/my.cnf:/etc/mysql/mysql.conf.d/my.cnf
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Redis
  redis:
    image: redis:5.0.7
    pull_policy: missing
    platform: linux/amd64
    container_name: casedance_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  # 3. Web
  web:
    build: .
    container_name: casedance_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    mem_limit: 2g
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env

  # 4. Celery Worker
  celery:
    build: .
    container_name: casedance_celery
    restart: always
    command: celery -A casedance worker -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env

  # 5. Celery Beat
  celery_beat:
    build: .
    container_name: casedance_celery_beat
    restart: always
    command: celery -A casedance beat -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env

  # 6. Flower 监控
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casedance_flower
    restart: always
    command: celery -A casedance flower --port=5555 --broker=redis://redis:6379/1 --url-prefix=flower
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    mem_limit: 256m

volumes:
  mysql_data:
  redis_data:
