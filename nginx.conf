# Casedance Nginx 配置（与旧服务器一致，适配 Docker 部署）
# 放置路径：/etc/nginx/conf.d/nginx.conf
# 校验重载：nginx -t && nginx -s reload

# ==================== 后端 API 服务（Django） ====================
server {
    listen       8000;
    server_name  casedance;
    charset      utf-8;

    # CORS 跨域
    add_header Access-Control-Allow-Methods *;
    add_header Access-Control-Max-Age 3600;
    add_header Access-Control-Allow-Credentials false;
    add_header Access-Control-Allow-Origin $http_origin;
    add_header Access-Control-Allow-Headers $http_access_control_request_headers;

    # 静态文件（docker-compose 挂载 /home/www/casedance/static → 容器 /app/static）
    location /static {
        alias /home/www/casedance/static;
    }

    # API + 后台
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ==================== 前端服务（cderp） ====================
server {
    listen       80;
    server_name  <域名或IP>;
    charset      utf-8;
    client_max_body_size 20m;

    # 前端页面
    location / {
        root /home/www/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 飞书 H5 页面
    location /feishu/ {
        alias /home/www/feishu/;
        try_files $uri $uri/ /feishu/index.html;
    }

    # API 转发
    location /api {
        proxy_pass http://127.0.0.1:8002;
    }
    location /media/ {
        proxy_pass http://127.0.0.1:8002;
    }
    location /flower/ {
        proxy_pass http://127.0.0.1:5555/flower/;
    }
}
