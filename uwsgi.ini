[uwsgi]
# 项目目录
chdir = /app
# Django wsgi 入口
module = casedance.wsgi
# 主进程
master = true
# 进程数（4GB 内存建议 2-3 个，每个约 200MB）
processes = 2
# 每个进程的线程数
threads = 2
# HTTP 监听（兼容 nginx proxy_pass http://）
http = 0.0.0.0:8000
# 不演示异常
harakiri = 60
# 工作进程请求上限（防止内存泄漏）
max-requests = 5000
# 工作进程请求上限后自动重启
max-worker-lifetime = 3600
# 优雅重启
reload-mercy = 10
# 退出时等待任务完成
worker-reload-mercy = 10
# 日志
logto = /var/log/uwsgi.log
# 清理环境
vacuum = true
# 关闭日志中的 IO 错误
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true
# buffer 大小
buffer-size = 32768
